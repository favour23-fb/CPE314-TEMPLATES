<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Basics</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        h1 {
            font-style: italic;
            text-decoration: underline;
        }

        .info-box {
            border: 2px solid #333;
            padding: 15px;
            margin: 20px 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
        }
    </style>
</head>

<body>

    <h1 style="color: blue;">Styled Heading</h1>
    <p>This paragraph uses external CSS.</p>

    <div class="info-box">
        <p>Bassey Favour Anietie &mdash; 24/EG/CO/268</p>
        <p>This div demonstrates a border, padding, margin, and a gradient background.</p>
    </div>

</body>

</html>
